<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SAPA - Sistem Aplikasi Pembayaran Aman</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/icon/favicon.ico">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Chart JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/bill.css">
    <link rel="stylesheet" href="css/spp.css">
    <link rel="stylesheet" href="css/pulsa.css">
    <link rel="stylesheet" href="css/history.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <div id="app">

        <!-- HEADER -->
        <header class="app-header">
            <div class="logo">
                <img src="assets/icon/logo-sapa.png" alt="SAPA Logo" class="logo-img" onerror="this.style.display='none'">
                <span class="logo-text">SAPA</span>
                <small class="logo-version">v1.0</small>
            </div>

            <button id="toggleDark" aria-label="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </header>

        <!-- MAIN APP -->
        <main id="appContent">
            <div class="initial-loading">
                <div class="spinner"></div>
                <p>Memuat SAPA...</p>
            </div>
        </main>

        <!-- BOTTOM NAVIGATION -->
        <nav class="bottom-nav" role="navigation" aria-label="Navigasi Utama">
            <button class="nav-item active" data-page="dashboard" aria-label="Beranda">
                <i class="fa-solid fa-house"></i>
                <span>Beranda</span>
            </button>

            <button class="nav-item" data-page="bill" aria-label="Tagihan">
                <i class="fa-solid fa-file-invoice"></i>
                <span>Tagihan</span>
            </button>

            <button class="nav-item center" data-page="spp" aria-label="SPP">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>SPP</span>
            </button>

            <button class="nav-item" data-page="pulsa" aria-label="Pulsa">
                <i class="fa-solid fa-mobile-screen"></i>
                <span>Pulsa</span>
            </button>

            <button class="nav-item" data-page="history" aria-label="Riwayat">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>Riwayat</span>
            </button>
        </nav>

        <!-- TOAST -->
        <div id="toast" role="alert" aria-live="polite"></div>

        <!-- ============================================================ -->
        <!-- LOADING OVERLAY - DIPERBAIKI -->
        <!-- ============================================================ -->
        <div id="loadingOverlay" class="loading-overlay">
            <div class="loading-spinner">
                <div class="spinner-ring"></div>
            </div>
            <p class="loading-text" id="loadingText">Memproses transaksi...</p>
        </div>

        <!-- MODAL -->
        <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
            <div class="modal-content">
                <div id="modalBody"></div>
            </div>
        </div>

    </div>

    <!-- JS FILES -->
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/bill.js"></script>
    <script src="js/spp.js"></script>
    <script src="js/pulsa.js"></script>
    <script src="js/history.js"></script>

</body>

</html>
